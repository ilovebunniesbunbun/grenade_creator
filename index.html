<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grenade Lineup Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.6);
            --panel-border: rgba(255, 255, 255, 0.1);
            --primary: #58a6ff;
            --primary-hover: #3182ce;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --input-bg: rgba(1, 4, 9, 0.8);
            --input-border: rgba(255, 255, 255, 0.1);
            --danger: #f85149;
            --danger-hover: #ff7b72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 10s ease-in-out infinite;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: #6e40c9;
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: #58a6ff;
            animation-delay: -5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -50px);
            }
        }

        .container {
            width: 100%;
            max-width: 800px;
            z-index: 1;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            color: #fff;
        }

        header h1 span {
            color: var(--primary);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input,
        select,
        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        textarea {
            resize: vertical;
        }

        .multi-input {
            display: flex;
            gap: 10px;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        #status-message {
            margin-top: 20px;
            text-align: center;
            font-size: 0.875rem;
            min-height: 20px;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .success {
            background: rgba(56, 139, 253, 0.1);
            border: 1px solid rgba(56, 139, 253, 0.2);
            color: #58a6ff;
        }

        .error {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.2);
            color: #f85149;
        }

        /* List view */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
        }

        .map-category {
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.02);
        }

        .map-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
            user-select: none;
        }

        .map-header:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .map-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .map-count {
            font-size: 0.8rem;
            background: rgba(88, 166, 255, 0.1);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .map-content {
            display: none;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        .map-category.open .map-content {
            display: block;
        }

        .nade-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 15px;
            position: relative;
            transition: transform 0.2s;
        }

        .nade-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .nade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-right: 40px;
        }

        .nade-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .nade-type {
            font-size: 0.75rem;
            background: rgba(88, 166, 255, 0.15);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .nade-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .nade-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
        }

        .detail-item strong {
            color: var(--text-main);
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .detail-item span {
            color: #fff;
            font-family: monospace;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.2);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        .delete-btn svg {
            width: 18px;
            height: 18px;
        }

        .connection-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .connection-status.connected {
            background: rgba(63, 185, 80, 0.1);
            color: #3fb950;
            border: 1px solid rgba(63, 185, 80, 0.2);
        }

        .connection-status.disconnected {
            background: rgba(248, 81, 73, 0.1);
            color: #f85149;
            border: 1px solid rgba(248, 81, 73, 0.2);
        }

        .live-data-panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .live-data-panel h4 {
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .live-data-panel h4 .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            display: inline-block;
            margin-right: 8px;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .live-data-panel h4 .live-dot.active {
            background: #3fb950;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .live-data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .live-data-item {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .live-data-item div {
            color: #fff;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .auto-fill-btn {
            width: 100%;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.2);
            color: var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auto-fill-btn:hover {
            background: rgba(88, 166, 255, 0.15);
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Lineup <span>Creator</span></h1>
        </header>

        <div id="connection-status" class="connection-status disconnected">● Disconnected from FC2</div>

        <div class="glass-panel">
            <form id="lineup-form">
                <div class="form-group">
                    <label for="map">Map Name</label>
                    <input type="text" id="map" placeholder="e.g. de_mirage" required>
                </div>

                <div class="form-group">
                    <label for="title">Lineup Title</label>
                    <input type="text" id="title" placeholder="e.g. Stairs Smoke from T-Spawn" required>
                </div>

                <div class="form-group">
                    <label for="description">Instructions / Description</label>
                    <textarea id="description" rows="2" placeholder="Where to stand, what to aim at..."></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="grenade_type">Grenade</label>
                        <select id="grenade_type" required>
                            <option value="smoke_grenade">Smoke</option>
                            <option value="flashbang">Flashbang</option>
                            <option value="he_grenade">HE Grenade</option>
                            <option value="molotov">Molotov</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="throw_type">Throw Type</label>
                        <select id="throw_type" required>
                            <option value="normal_throw">Normal</option>
                            <option value="jump_throw">Jump</option>
                            <option value="crouch_throw">Crouch</option>
                            <option value="crouch_jump_throw">Crouch Jump</option>
                            <option value="w_jump_throw">W Jump</option>
                            <option value="w_shift_jumpthrow">W Shift Jump</option>
                            <option value="shiftwalk_jumpthrow">Shift Walk Jump</option>
                            <option value="d_jumpthrow">D Jump</option>
                            <option value="a_jumpthrow">A Jump</option>
                            <option value="s_jumpthrow">S Jump</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>View Angles</label>
                        <div class="multi-input">
                            <input type="number" step="any" id="view_angle_x" placeholder="Pitch" required>
                            <input type="number" step="any" id="view_angle_y" placeholder="Yaw" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Position</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" step="any" id="pos_x" placeholder="X" required>
                            <input type="number" step="any" id="pos_y" placeholder="Y" required>
                            <input type="number" step="any" id="pos_z" placeholder="Z" required>
                        </div>
                    </div>
                </div>

                <div class="live-data-panel">
                    <h4><span class="live-dot" id="live-dot"></span> Live Game Data</h4>
                    <div class="live-data-grid">
                        <div class="live-data-item">Map <div id="live-map">—</div>
                        </div>
                        <div class="live-data-item">Grenade <div id="live-weapon">—</div>
                        </div>
                        <div class="live-data-item">Angles <div id="live-angles">—</div>
                        </div>
                        <div class="live-data-item">Position <div id="live-pos">—</div>
                        </div>
                    </div>
                    <button type="button" id="auto-fill-btn" class="auto-fill-btn">Fill Data</button>
                </div>

                <button type="submit" class="submit-btn" id="save-btn">Save Lineup</button>
                <div id="status-message"></div>
            </form>
        </div>

        <div class="section-header">
            <h2 class="section-title">Saved Lineups</h2>
            <button id="refresh-btn" class="auto-fill-btn" style="width: auto; padding: 6px 12px; font-size: 0.8rem;">↻
                Reload</button>
        </div>

        <div id="visual-list">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        const NODE_BASE = window.location.origin;
        let latestPlayerData = null;
        let currentGrenadeData = {};

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('lineup-form');
            const statusMsg = document.getElementById('status-message');
            const visualList = document.getElementById('visual-list');
            const connStatus = document.getElementById('connection-status');
            const liveDot = document.getElementById('live-dot');
            const autoFillBtn = document.getElementById('auto-fill-btn');
            const refreshBtn = document.getElementById('refresh-btn');

            async function pollPlayerData() {
                try {
                    const res = await fetch(`${NODE_BASE}/?action=get_player_data`, {
                        signal: AbortSignal.timeout(1500)
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (!data.error) {
                            latestPlayerData = data;
                            liveDot.classList.add('active');
                            connStatus.textContent = '● Connected to FC2';
                            connStatus.className = 'connection-status connected';

                            document.getElementById('live-map').textContent = data.map || '—';
                            document.getElementById('live-weapon').textContent = data.weapon ? data.weapon.replace(/_/g, ' ') : '—';
                            document.getElementById('live-angles').textContent = data.angles ? `${data.angles.x.toFixed(1)}, ${data.angles.y.toFixed(1)}` : '—';
                            document.getElementById('live-pos').textContent = data.position ? `${data.position.x.toFixed(0)}, ${data.position.y.toFixed(0)}, ${data.position.z.toFixed(0)}` : '—';
                        } else {
                            liveDot.classList.remove('active');
                            connStatus.textContent = '● FC2 Standby (' + data.error + ')';
                            connStatus.className = 'connection-status connected';
                        }
                        return;
                    }
                } catch (e) { }
                liveDot.classList.remove('active');
                connStatus.textContent = '● Disconnected from FC2';
                connStatus.className = 'connection-status disconnected';
            }
            pollPlayerData();
            setInterval(pollPlayerData, 1000);

            autoFillBtn.addEventListener('click', () => {
                if (!latestPlayerData || latestPlayerData.error) {
                    showStatus(statusMsg, 'No live data available. Are you in-game?', 'error');
                    return;
                }
                const d = latestPlayerData;
                if (d.map) document.getElementById('map').value = d.map;
                if (d.weapon) {
                    const sel = document.getElementById('grenade_type');
                    const opt = Array.from(sel.options).find(o => o.value === d.weapon);
                    if (opt) opt.selected = true;
                }
                if (d.angles) {
                    document.getElementById('view_angle_x').value = d.angles.x;
                    document.getElementById('view_angle_y').value = d.angles.y;
                }
                if (d.position) {
                    document.getElementById('pos_x').value = d.position.x;
                    document.getElementById('pos_y').value = d.position.y;
                    document.getElementById('pos_z').value = d.position.z;
                }
                showStatus(statusMsg, 'Live data captured!', 'success');
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const saveBtn = document.getElementById('save-btn');
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

                const payload = {
                    map: document.getElementById('map').value,
                    grenade_type: document.getElementById('grenade_type').value,
                    title: document.getElementById('title').value,
                    description: document.getElementById('description').value || "",
                    throw_type: document.getElementById('throw_type').value,
                    view_angle: {
                        x: parseFloat(document.getElementById('view_angle_x').value),
                        y: parseFloat(document.getElementById('view_angle_y').value)
                    },
                    position: {
                        x: parseFloat(document.getElementById('pos_x').value),
                        y: parseFloat(document.getElementById('pos_y').value),
                        z: parseFloat(document.getElementById('pos_z').value)
                    }
                };

                try {
                    const res = await fetch(`${NODE_BASE}/?action=save`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        showStatus(statusMsg, 'Lineup saved!', 'success');
                        form.reset();
                        loadJSON(); // Refresh list
                    } else {
                        showStatus(statusMsg, 'Save failed.', 'error');
                    }
                } catch (err) {
                    showStatus(statusMsg, 'Server error.', 'error');
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Lineup';
                }
            });

            async function loadJSON() {
                try {
                    const res = await fetch(`${NODE_BASE}/?action=load`);
                    currentGrenadeData = await res.json();
                    renderVisualList(currentGrenadeData);
                } catch (err) {
                    visualList.innerHTML = '<p class="error">Failed to load lineups.</p>';
                }
            }
            loadJSON();
            refreshBtn.addEventListener('click', loadJSON);

            async function saveToServer(data) {
                try {
                    const res = await fetch(`${NODE_BASE}/?action=save_raw`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    return res.ok;
                } catch (err) {
                    return false;
                }
            }

            async function deleteNade(map, index) {
                if (!confirm('Are you sure you want to delete this lineup?')) return;

                currentGrenadeData[map].splice(index, 1);
                if (currentGrenadeData[map].length === 0) {
                    delete currentGrenadeData[map];
                }

                const success = await saveToServer(currentGrenadeData);
                if (success) {
                    renderVisualList(currentGrenadeData);
                } else {
                    alert('Delete failed on server.');
                }
            }

            function renderVisualList(data) {
                visualList.innerHTML = '';
                if (!data || Object.keys(data).length === 0) {
                    visualList.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding: 40px; background: rgba(0,0,0,0.2); border-radius: 16px;">No lineups saved yet.</p>';
                    return;
                }

                for (const [mapName, nades] of Object.entries(data)) {
                    const mapCat = document.createElement('div');
                    mapCat.className = 'map-category';
                    mapCat.id = `cat-${mapName}`;

                    const header = document.createElement('div');
                    header.className = 'map-header';
                    header.innerHTML = `
                    <span class="map-title">${mapName}</span>
                    <span class="map-count">${nades.length}</span>
                `;
                    header.onclick = () => mapCat.classList.toggle('open');

                    const content = document.createElement('div');
                    content.className = 'map-content';

                    nades.forEach((nade, idx) => {
                        const card = document.createElement('div');
                        card.className = 'nade-card';
                        card.innerHTML = `
                        <button class="delete-btn" title="Delete">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                        <div class="nade-header">
                            <div class="nade-title">${nade.title}</div>
                            <div class="nade-type">${nade.grenade_type.replace('_', ' ')}</div>
                        </div>
                        <div class="nade-desc">${nade.description || "No description provided."}</div>
                        <div class="nade-details">
                            <div class="detail-item"><strong>Throw Type</strong><span>${nade.throw_type.replace(/_/g, ' ')}</span></div>
                            <div class="detail-item"><strong>Angles (X, Y)</strong><span>${nade.view_angle.x.toFixed(2)}, ${nade.view_angle.y.toFixed(2)}</span></div>
                            <div class="detail-item" style="grid-column: span 2"><strong>Position (X, Y, Z)</strong><span>${nade.position.x.toFixed(1)}, ${nade.position.y.toFixed(1)}, ${nade.position.z.toFixed(1)}</span></div>
                        </div>
                    `;

                        card.querySelector('.delete-btn').onclick = (e) => {
                            e.stopPropagation();
                            deleteNade(mapName, idx);
                        };

                        content.appendChild(card);
                    });

                    mapCat.appendChild(header);
                    mapCat.appendChild(content);
                    visualList.appendChild(mapCat);
                }
            }

            function showStatus(elem, msg, type) {
                elem.textContent = msg;
                elem.className = type;
                setTimeout(() => { elem.textContent = ''; elem.className = ''; }, 4000);
            }
        });
    </script>
</body>

</html>
